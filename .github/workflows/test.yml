name: Extract Domains

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set fetch mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=conditional" >> $GITHUB_OUTPUT
            echo "Fetch mode: conditional (use If-Modified-Since)"
          else
            echo "mode=force" >> $GITHUB_OUTPUT
            echo "Fetch mode: force (always download latest)"
          fi

      - name: Compute yesterday's midnight (UTC)
        if: steps.mode.outputs.mode == 'conditional'
        id: yesterday
        run: |
          YESTERDAY_MIDNIGHT=$(date -d "yesterday 00:00:00" -u +"%a, %d %b %Y %H:%M:%S GMT")
          echo "Checking for changes since: $YESTERDAY_MIDNIGHT"
          echo "timestamp=$YESTERDAY_MIDNIGHT" >> $GITHUB_OUTPUT

      - name: Fetch hosts file (conditional)
        if: steps.mode.outputs.mode == 'conditional'
        id: fetch_conditional
        run: |
          URL="https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
          LAST_CHECK="${{ steps.yesterday.outputs.timestamp }}"

          echo "Sending conditional request with If-Modified-Since: $LAST_CHECK"
          STATUS=$(curl -o hosts.txt -s -w "%{http_code}" \
            -H "If-Modified-Since: $LAST_CHECK" "$URL")

          echo "HTTP status: $STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          if [ "$STATUS" = "200" ]; then
            echo "✅ File changed since yesterday midnight – downloaded."
          elif [ "$STATUS" = "304" ]; then
            echo "⏭️ No changes since yesterday midnight – skipping rest of workflow."
          else
            echo "⚠️ Unexpected HTTP status $STATUS"
          fi

      - name: Fetch hosts file (force / manual)
        if: steps.mode.outputs.mode == 'force'
        id: fetch_force
        run: |
          URL="https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
          echo "Manual run: downloading latest hosts file unconditionally..."
          curl -s -o hosts.txt "$URL"
          echo "status=200" >> $GITHUB_OUTPUT
          echo "✅ File downloaded."

      - name: Extract blocked domains and create temporary JSON
        if: steps.fetch_conditional.outputs.status == '200' || steps.fetch_force.outputs.status == '200'
        run: |
          echo "Extracting domains from hosts file..."
          awk '/^0\.0\.0\.0/ {print $2}' hosts.txt | \
            grep -vE '^([0-9]{1,3}\.){3}[0-9]{1,3}$|^[a-fA-F0-9:]+$' | \
            sort -u | \
            jq -R . | jq -s . > domains_new.json

          COUNT=$(jq length domains_new.json)
          echo "✅ Extracted $COUNT unique blocked domains (IP addresses excluded)"

      - name: Compare and commit (for conditional fetch – only on 200)
        if: steps.fetch_conditional.outputs.status == '200'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f domains.json ]; then
            mv domains_new.json domains.json
            git add domains.json
            git commit -m "Initial domains from StevenBlack/hosts ($(date -u +'%Y-%m-%d')) [skip ci]"
            git push
            echo "🚀 Committed initial domains.json"
          else
            if cmp -s domains.json domains_new.json; then
              echo "📝 No changes in domain list – nothing to commit."
              rm domains_new.json
            else
              mv domains_new.json domains.json
              git add domains.json
              git commit -m "Update domains from StevenBlack/hosts ($(date -u +'%Y-%m-%d')) [skip ci]"
              git push
              echo "🚀 Committed updated domains.json"
            fi
          fi

      - name: Compare and commit (for manual/force fetch)
        if: steps.fetch_force.outputs.status == '200'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f domains.json ]; then
            mv domains_new.json domains.json
            git add domains.json
            git commit -m "Initial domains from StevenBlack/hosts (manual run) [skip ci]"
            git push
            echo "🚀 Committed initial domains.json"
          else
            if cmp -s domains.json domains_new.json; then
              echo "📝 No changes in domain list – nothing to commit."
              rm domains_new.json
            else
              mv domains_new.json domains.json
              git add domains.json
              git commit -m "Update domains from StevenBlack/hosts (manual run) [skip ci]"
              git push
              echo "🚀 Committed updated domains.json"
            fi
          fi

      - name: Clean up
        if: always()
        run: rm -f hosts.txt domains_new.json
